syntax = "proto3";

package meshtastic;

option csharp_namespace = "Meshtastic.Protobufs";
option go_package = "github.com/meshtastic/go/generated";
option java_outer_classname = "TelemetryProtos";
option java_package = "org.meshtastic.proto";
option swift_prefix = "";

/*
 * Key native device metrics such as battery level
 */
message DeviceMetrics {
  /*
   * 0-100 (>100 means powered)
   */
  optional uint32 battery_level = 1;

  /*
   * Voltage in mV (millivolts)
   */
  optional uint32 voltage = 2;

  /*
   * Channel utilization x100 (e.g. 2550 = 25.50%)
   */
  optional uint32 channel_utilization = 3;

  /*
   * Percent of airtime for TX x100 (e.g. 1025 = 10.25%)
   */
  optional uint32 air_util_tx = 4;

  /*
   * How long the device has been running since the last reboot (in seconds)
   */
  optional uint32 uptime_seconds = 5;
}

/*
 * Weather station or other environmental metrics
 */
message EnvironmentMetrics {
  /*
   * Temperature in centi-degrees Celsius (e.g. 2350 = 23.50°C)
   */
  optional sint32 temperature = 1;

  /*
   * Relative humidity x100 (e.g. 6550 = 65.50%)
   */
  optional uint32 relative_humidity = 2;

  /*
   * Barometric pressure in Pa (pascals, e.g. 101325)
   */
  optional uint32 barometric_pressure = 3;

  /*
   * Gas resistance in kOhm (e.g. 150 = 150 kOhm)
   */
  optional uint32 gas_resistance = 4;

  /*
   * relative scale IAQ value as measured by Bosch BME680 . value 0-500.
   * Belongs to Air Quality but is not particle but VOC measurement. Other VOC values can also be put in here.
   */
  optional uint32 iaq = 7;

  /*
   * Distance in mm (e.g. RCWL9620 water level sensor)
   */
  optional uint32 distance = 8;

  /*
   * Ambient light in lux x100 (e.g. 54321 = 543.21 lux)
   */
  optional uint32 lux = 9;

  /*
   * White light irradiance in lux x100
   */
  optional uint32 white_lux = 10;

  /*
   * Infrared lux x100
   */
  optional uint32 ir_lux = 11;

  /*
   * Ultraviolet lux x100
   */
  optional uint32 uv_lux = 12;

  /*
   * Wind direction in degrees
   * 0 degrees = North, 90 = East, etc...
   */
  optional uint32 wind_direction = 13;

  /*
   * Wind speed in cm/s (e.g. 1250 = 12.50 m/s)
   */
  optional uint32 wind_speed = 14;

  /*
   * Weight in grams
   */
  optional uint32 weight = 15;

  /*
   * Wind gust in cm/s
   */
  optional uint32 wind_gust = 16;

  /*
   * Wind lull in cm/s
   */
  optional uint32 wind_lull = 17;

  /*
   * Radiation in µR/h x100 (e.g. 1234 = 12.34 µR/h)
   */
  optional uint32 radiation = 18;

  /*
   * Rainfall last hour in mm x100 (e.g. 250 = 2.50mm)
   */
  optional uint32 rainfall_1h = 19;

  /*
   * Rainfall last 24h in mm x100
   */
  optional uint32 rainfall_24h = 20;

  /*
   * Soil moisture measured (% 1-100)
   */
  optional uint32 soil_moisture = 21;

  /*
   * Soil temperature in centi-degrees Celsius
   */
  optional sint32 soil_temperature = 22;
}

/*
 * Power Metrics (voltage / current / etc)
 */
message PowerMetrics {
  /*
   * Voltage in mV (Ch1)
   */
  optional uint32 ch1_voltage = 1;

  /*
   * Current in mA (signed, negative = discharging) (Ch1)
   */
  optional sint32 ch1_current = 2;

  /*
   * Voltage in mV (Ch2)
   */
  optional uint32 ch2_voltage = 3;

  /*
   * Current in mA (signed, negative = discharging) (Ch2)
   */
  optional sint32 ch2_current = 4;

  /*
   * Voltage in mV (Ch3)
   */
  optional uint32 ch3_voltage = 5;

  /*
   * Current in mA (signed, negative = discharging) (Ch3)
   */
  optional sint32 ch3_current = 6;

  /*
   * Voltage in mV (Ch4)
   */
  optional uint32 ch4_voltage = 7;

  /*
   * Current in mA (signed, negative = discharging) (Ch4)
   */
  optional sint32 ch4_current = 8;

  /*
   * Voltage in mV (Ch5)
   */
  optional uint32 ch5_voltage = 9;

  /*
   * Current in mA (signed, negative = discharging) (Ch5)
   */
  optional sint32 ch5_current = 10;

  /*
   * Voltage in mV (Ch6)
   */
  optional uint32 ch6_voltage = 11;

  /*
   * Current in mA (signed, negative = discharging) (Ch6)
   */
  optional sint32 ch6_current = 12;

  /*
   * Voltage in mV (Ch7)
   */
  optional uint32 ch7_voltage = 13;

  /*
   * Current in mA (signed, negative = discharging) (Ch7)
   */
  optional sint32 ch7_current = 14;

  /*
   * Voltage in mV (Ch8)
   */
  optional uint32 ch8_voltage = 15;

  /*
   * Current in mA (signed, negative = discharging) (Ch8)
   */
  optional sint32 ch8_current = 16;
}

/*
 * Air quality metrics
 */
message AirQualityMetrics {
  /*
   * Concentration Units Standard PM1.0 in ug/m3
   */
  optional uint32 pm10_standard = 1;

  /*
   * Concentration Units Standard PM2.5 in ug/m3
   */
  optional uint32 pm25_standard = 2;

  /*
   * Concentration Units Standard PM10.0 in ug/m3
   */
  optional uint32 pm100_standard = 3;

  /*
   * Concentration Units Environmental PM1.0 in ug/m3
   */
  optional uint32 pm10_environmental = 4;

  /*
   * Concentration Units Environmental PM2.5 in ug/m3
   */
  optional uint32 pm25_environmental = 5;

  /*
   * Concentration Units Environmental PM10.0 in ug/m3
   */
  optional uint32 pm100_environmental = 6;

  /*
   * 0.3um Particle Count in #/0.1l
   */
  optional uint32 particles_03um = 7;

  /*
   * 0.5um Particle Count in #/0.1l
   */
  optional uint32 particles_05um = 8;

  /*
   * 1.0um Particle Count in #/0.1l
   */
  optional uint32 particles_10um = 9;

  /*
   * 2.5um Particle Count in #/0.1l
   */
  optional uint32 particles_25um = 10;

  /*
   * 5.0um Particle Count in #/0.1l
   */
  optional uint32 particles_50um = 11;

  /*
   * 10.0um Particle Count in #/0.1l
   */
  optional uint32 particles_100um = 12;

  /*
   * CO2 concentration in ppm
   */
  optional uint32 co2 = 13;

  /*
   * CO2 sensor temperature in centi-degrees Celsius
   */
  optional sint32 co2_temperature = 14;

  /*
   * CO2 sensor humidity x100
   */
  optional uint32 co2_humidity = 15;

  /*
   * Formaldehyde concentration in ppb x100
   */
  optional uint32 form_formaldehyde = 16;

  /*
   * Formaldehyde sensor humidity x100
   */
  optional uint32 form_humidity = 17;

  /*
   * Formaldehyde sensor temperature in centi-degrees Celsius
   */
  optional sint32 form_temperature = 18;

  /*
   * Concentration Units Standard PM4.0 in ug/m3
   */
  optional uint32 pm40_standard = 19;

  /*
   * 4.0um Particle Count in #/0.1l
   */
  optional uint32 particles_40um = 20;

  /*
   * PM sensor temperature in centi-degrees Celsius
   */
  optional sint32 pm_temperature = 21;

  /*
   * PM sensor humidity x100
   */
  optional uint32 pm_humidity = 22;

  /*
   * PM sensor VOC index x100
   */
  optional uint32 pm_voc_idx = 23;

  /*
   * PM sensor NOx index x100
   */
  optional uint32 pm_nox_idx = 24;

  /*
   * Typical particle size in nm (nanometers)
   */
  optional uint32 particles_tps = 25;
}

/*
 * Local device mesh statistics
 */
message LocalStats {
  /*
   * How long the device has been running since the last reboot (in seconds)
   */
  uint32 uptime_seconds = 1;
  /*
   * Channel utilization x100
   */
  uint32 channel_utilization = 2;
  /*
   * Percent of airtime for TX x100
   */
  uint32 air_util_tx = 3;

  /*
   * Number of packets sent
   */
  uint32 num_packets_tx = 4;

  /*
   * Number of packets received (both good and bad)
   */
  uint32 num_packets_rx = 5;

  /*
   * Number of packets received that are malformed or violate the protocol
   */
  uint32 num_packets_rx_bad = 6;

  /*
   * Number of nodes online (in the past 2 hours)
   */
  uint32 num_online_nodes = 7;

  /*
   * Number of nodes total
   */
  uint32 num_total_nodes = 8;

  /*
   * Number of received packets that were duplicates (due to multiple nodes relaying).
   * If this number is high, there are nodes in the mesh relaying packets when it's unnecessary, for example due to the ROUTER/REPEATER role.
   */
  uint32 num_rx_dupe = 9;

  /*
   * Number of packets we transmitted that were a relay for others (not originating from ourselves).
   */
  uint32 num_tx_relay = 10;

  /*
   * Number of times we canceled a packet to be relayed, because someone else did it before us.
   * This will always be zero for ROUTERs/REPEATERs. If this number is high, some other node(s) is/are relaying faster than you.
   */
  uint32 num_tx_relay_canceled = 11;

  /*
   * Number of bytes used in the heap
   */
  uint32 heap_total_bytes = 12;

  /*
   * Number of bytes free in the heap
   */
  uint32 heap_free_bytes = 13;

  /*
   * Number of packets that were dropped because the transmit queue was full.
   */
  uint32 num_tx_dropped = 14;

  /*
   * Noise floor in dBm (negative)
   */
  sint32 noise_floor = 15;
}

/*
 * Traffic management statistics for mesh network optimization
 */
message TrafficManagementStats {
  /*
   * Total number of packets inspected by traffic management
   */
  uint32 packets_inspected = 1;

  /*
   * Number of position packets dropped due to deduplication
   */
  uint32 position_dedup_drops = 2;

  /*
   * Number of NodeInfo requests answered from cache
   */
  uint32 nodeinfo_cache_hits = 3;

  /*
   * Number of packets dropped due to rate limiting
   */
  uint32 rate_limit_drops = 4;

  /*
   * Number of unknown/undecryptable packets dropped
   */
  uint32 unknown_packet_drops = 5;

  /*
   * Number of packets with hop_limit exhausted for local-only broadcast
   */
  uint32 hop_exhausted_packets = 6;

  /*
   * Number of times router hop preservation was applied
   */
  uint32 router_hops_preserved = 7;
}

/*
 * Health telemetry metrics
 */
message HealthMetrics {
  /*
   * Heart rate (beats per minute)
   */
  optional uint32 heart_bpm = 1;

  /*
   * SpO2 (blood oxygen saturation) level
   */
  optional uint32 spO2 = 2;

  /*
   * Body temperature in centi-degrees Celsius
   */
  optional sint32 temperature = 3;
}

/*
 * Linux host metrics
 */
message HostMetrics {
  /*
   * Host system uptime
   */
  uint32 uptime_seconds = 1;

  /*
   * Host system free memory
   */
  uint64 freemem_bytes = 2;

  /*
   * Host system disk space free for /
   */
  uint64 diskfree1_bytes = 3;

  /*
   * Secondary system disk space free
   */
  optional uint64 diskfree2_bytes = 4;

  /*
   * Tertiary disk space free
   */
  optional uint64 diskfree3_bytes = 5;

  /*
   * Host system one minute load in 1/100ths
   */
  uint32 load1 = 6;

  /*
   * Host system five minute load  in 1/100ths
   */
  uint32 load5 = 7;

  /*
   * Host system fifteen minute load  in 1/100ths
   */
  uint32 load15 = 8;

  /*
   * Optional User-provided string for arbitrary host system information
   * that doesn't make sense as a dedicated entry.
   */
  optional string user_string = 9;
}

/*
 * Types of Measurements the telemetry module is equipped to handle
 */
message Telemetry {
  /*
   * Seconds since 1970 - or 0 for unknown/unset
   */
  fixed32 time = 1;

  oneof variant {
    /*
     * Key native device metrics such as battery level
     */
    DeviceMetrics device_metrics = 2;

    /*
     * Weather station or other environmental metrics
     */
    EnvironmentMetrics environment_metrics = 3;

    /*
     * Air quality metrics
     */
    AirQualityMetrics air_quality_metrics = 4;

    /*
     * Power Metrics
     */
    PowerMetrics power_metrics = 5;

    /*
     * Local device mesh statistics
     */
    LocalStats local_stats = 6;

    /*
     * Health telemetry metrics
     */
    HealthMetrics health_metrics = 7;

    /*
     * Linux host metrics
     */
    HostMetrics host_metrics = 8;

    /*
     * Traffic management statistics
     */
    TrafficManagementStats traffic_management_stats = 9;
  }
}

/*
 * Supported I2C Sensors for telemetry in Meshtastic
 */
enum TelemetrySensorType {
  /*
   * No external telemetry sensor explicitly set
   */
  SENSOR_UNSET = 0;

  /*
   * High accuracy temperature, pressure, humidity
   */
  BME280 = 1;

  /*
   * High accuracy temperature, pressure, humidity, and air resistance
   */
  BME680 = 2;

  /*
   * Very high accuracy temperature
   */
  MCP9808 = 3;

  /*
   * Moderate accuracy current and voltage
   */
  INA260 = 4;

  /*
   * Moderate accuracy current and voltage
   */
  INA219 = 5;

  /*
   * High accuracy temperature and pressure
   */
  BMP280 = 6;

  /*
   * High accuracy temperature and humidity
   */
  SHTC3 = 7;

  /*
   * High accuracy pressure
   */
  LPS22 = 8;

  /*
   * 3-Axis magnetic sensor
   */
  QMC6310 = 9;

  /*
   * 6-Axis inertial measurement sensor
   */
  QMI8658 = 10;

  /*
   * 3-Axis magnetic sensor
   */
  QMC5883L = 11;

  /*
   * High accuracy temperature and humidity
   */
  SHT31 = 12;

  /*
   * PM2.5 air quality sensor
   */
  PMSA003I = 13;

  /*
   * INA3221 3 Channel Voltage / Current Sensor
   */
  INA3221 = 14;

  /*
   * BMP085/BMP180 High accuracy temperature and pressure (older Version of BMP280)
   */
  BMP085 = 15;

  /*
   * RCWL-9620 Doppler Radar Distance Sensor, used for water level detection
   */
  RCWL9620 = 16;

  /*
   * Sensirion High accuracy temperature and humidity
   */
  SHT4X = 17;

  /*
   * VEML7700 high accuracy ambient light(Lux) digital 16-bit resolution sensor.
   */
  VEML7700 = 18;

  /*
   * MLX90632 non-contact IR temperature sensor.
   */
  MLX90632 = 19;

  /*
   * TI OPT3001 Ambient Light Sensor
   */
  OPT3001 = 20;

  /*
   * Lite On LTR-390UV-01 UV Light Sensor
   */
  LTR390UV = 21;

  /*
   * AMS TSL25911FN RGB Light Sensor
   */
  TSL25911FN = 22;

  /*
   * AHT10 Integrated temperature and humidity sensor
   */
  AHT10 = 23;

  /*
   * DFRobot Lark Weather station (temperature, humidity, pressure, wind speed and direction)
   */
  DFROBOT_LARK = 24;

  /*
   * NAU7802 Scale Chip or compatible
   */
  NAU7802 = 25;

  /*
   * BMP3XX High accuracy temperature and pressure
   */
  BMP3XX = 26;

  /*
   * ICM-20948 9-Axis digital motion processor
   */
  ICM20948 = 27;

  /*
   * MAX17048 1S lipo battery sensor (voltage, state of charge, time to go)
   */
  MAX17048 = 28;

  /*
   * Custom I2C sensor implementation based on https://github.com/meshtastic/i2c-sensor
   */
  CUSTOM_SENSOR = 29;

  /*
   * MAX30102 Pulse Oximeter and Heart-Rate Sensor
   */
  MAX30102 = 30;

  /*
   * MLX90614 non-contact IR temperature sensor
   */
  MLX90614 = 31;

  /*
   * SCD40/SCD41 CO2, humidity, temperature sensor
   */
  SCD4X = 32;

  /*
   * ClimateGuard RadSens, radiation, Geiger-Muller Tube
   */
  RADSENS = 33;

  /*
   * High accuracy current and voltage
   */
  INA226 = 34;

  /*
   * DFRobot Gravity tipping bucket rain gauge
   */
  DFROBOT_RAIN = 35;

  /*
   * Infineon DPS310 High accuracy pressure and temperature
   */
  DPS310 = 36;

  /*
   * RAKWireless RAK12035 Soil Moisture Sensor Module
   */
  RAK12035 = 37;

  /*
   * MAX17261 lipo battery gauge
   */
  MAX17261 = 38;

  /*
   * PCT2075 Temperature Sensor
   */
  PCT2075 = 39;

  /*
   * ADS1X15 ADC
   */
  ADS1X15 = 40;

  /*
   * ADS1X15 ADC_ALT
   */
  ADS1X15_ALT = 41;

  /*
   * Sensirion SFA30 Formaldehyde sensor
   */
  SFA30 = 42;

  /*
   * SEN5X PM SENSORS
   */
  SEN5X = 43;

  /*
   * TSL2561 light sensor
   */
  TSL2561 = 44;

  /*
   * BH1750 light sensor
   */
  BH1750 = 45;

  /*
   * HDC1080 Temperature and Humidity Sensor
   */
  HDC1080 = 46;

  /*
   * STH21 Temperature and R. Humidity sensor
   */
  SHT21 = 47;

  /*
   * Sensirion STC31 CO2 sensor
   */
  STC31 = 48;

  /*
   * SCD30 CO2, humidity, temperature sensor
   */
  SCD30 = 49;
}

/*
 * NAU7802 Telemetry configuration, for saving to flash
 */
message Nau7802Config {
  /*
   * The offset setting for the NAU7802
   */
  int32 zeroOffset = 1;

  /*
   * The calibration factor for the NAU7802
   */
  float calibrationFactor = 2;
}

/*
 * SEN5X State, for saving to flash
 */
message SEN5XState {
  /*
   * Last cleaning time for SEN5X
   */
  uint32 last_cleaning_time = 1;

  /*
   * Last cleaning time for SEN5X - valid flag
   */
  bool last_cleaning_valid = 2;

  /*
   * Config flag for one-shot mode (see admin.proto)
   */
  bool one_shot_mode = 3;

  /*
   * Last VOC state time for SEN55
   */
  optional uint32 voc_state_time = 4;

  /*
   * Last VOC state validity flag for SEN55
   */
  optional bool voc_state_valid = 5;

  /*
   * VOC state array (8x uint8t) for SEN55
   */
  optional fixed64 voc_state_array = 6;
}
