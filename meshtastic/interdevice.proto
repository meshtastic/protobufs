syntax = "proto3";

package meshtastic;

option csharp_namespace = "Meshtastic.Protobufs";
option go_package = "github.com/meshtastic/go/generated";
option java_outer_classname = "InterdeviceProtos";
option java_package = "org.meshtastic.proto";
option swift_prefix = "";

// Defines the supported file operations
enum FileOperation {
  GET = 0;
  POST = 1;
  PUT = 2;
  DELETE = 3;
}

// Message for file operations
message FileTransfer {
  FileOperation operation = 1; // File operation (GET, POST, PUT, DELETE)
  string filepath = 2;         // Path of the file on the SD card
  bytes filedata = 3;          // Chunk content (POST/PUT request, GET response)
  bool success = 4;            // Response: Was the operation successful?
  string message = 5;          // Response: Status message
  uint32 offset = 6;           // Byte offset of this chunk within the file (ranged GET/PUT)
  uint32 length = 7;           // GET request: number of bytes to read (0 = max chunk size)
  uint32 file_size = 8;        // GET response: total size of the file
}

// Message for structured directory listing
message DirectoryListing {
  string directory = 1;          // Path of the directory
  repeated string filenames = 2; // List of file names
  bool success = 3;              // Response: Was the operation successful?
  string message = 4;            // Response: Status message
  uint32 offset = 5;             // Request: skip this many entries (paging)
  uint32 total_count = 6;        // Response: total number of entries in the directory
}

// A single I2C transaction: an optional write followed by an optional
// read with repeated start, matching the TwoWire usage of sensor drivers
// (beginTransmission/write.../endTransmission(false)/requestFrom)
message I2CTransaction {
  uint32 address = 1;   // 7-bit device address
  bytes write_data = 2; // Bytes to write, may be empty
  uint32 read_len = 3;  // Number of bytes to read after the write, 0 = write-only
}

// SD card statistics
message SdCardInfo {
  enum CardType {
    NONE = 0;
    MMC = 1;
    SD = 2;
    SDHC = 3;
    SDXC = 4;
    UNKNOWN_CARD = 5;
  }
  enum FatType {
    UNKNOWN_FAT = 0;
    FAT16 = 1;
    FAT32 = 2;
    EXFAT = 3;
  }
  bool present = 1;      // Card initialized and usable
  CardType card_type = 2;
  FatType fat_type = 3;
  uint64 card_size = 4;  // Filesystem size in bytes
  uint64 used_bytes = 5; // Used bytes (may be expensive to compute on FAT32)
  uint64 free_bytes = 6; // Free bytes
}

// Result of an I2CTransaction
message I2CResult {
  enum Status {
    OK = 0;
    NACK_ADDRESS = 1;
    NACK_DATA = 2;
    ERROR = 3;
  }
  Status status = 1;
  bytes read_data = 2; // Data read from the device, empty for write-only transactions
}

// Main message for interdevice communication
message InterdeviceMessage {
  // The message data
  oneof data {
    string nmea = 1;
    uint32 beep = 2;
    I2CTransaction i2c_transaction = 3;
    I2CResult i2c_result = 4;
    bool i2c_scan = 5;         // Request: scan the secondary I2C bus
    bytes i2c_scan_result = 6; // Response: 7-bit addresses of discovered devices
    FileTransfer file_transfer = 7;
    DirectoryListing directory_listing = 8;
    bool get_sd_info = 9;   // Request: SD card statistics
    SdCardInfo sd_info = 10; // Response
  }
}
