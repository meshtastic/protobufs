syntax = "proto3";

package meshtastic;

import "meshtastic/common.proto";
import "meshtastic/portnums.proto";

option csharp_namespace = "Meshtastic.Protobufs";
option go_package = "github.com/meshtastic/go/generated";
option java_outer_classname = "WireProtos";
option java_package = "org.meshtastic.proto";
option swift_prefix = "";

/*
 * A GPS Position
 */
message Position {
  /*
   * The new preferred location encoding, multiply by 1e-7 to get degrees
   * in floating point
   */
  optional sfixed32 latitude_i = 1;

  /*
   * The new preferred location encoding, multiply by 1e-7 to get degrees
   * in floating point
   */
  optional sfixed32 longitude_i = 2;

  /*
   * In meters above MSL (but see issue #359)
   * Wire encoding: sint32 (W1 fix, was int32)
   */
  optional sint32 altitude = 3;

  /*
   * This is usually not sent over the mesh (to save space), but it is sent
   * from the phone so that the local device can set its time if it is sent over
   * the mesh (because there are devices on the mesh without GPS or RTC).
   * seconds since 1970
   */
  fixed32 time = 4;

  /*
   * How the location was acquired: manual, onboard GPS, external (EUD) GPS
   * Uses top-level LocSource enum from common.proto (was nested enum in 2.x)
   */
  LocSource location_source = 5;

  /*
   * How the altitude was acquired: manual, GPS int/ext, etc
   * Default: same as location_source if present
   * Uses top-level AltSource enum from common.proto (was nested enum in 2.x)
   */
  AltSource altitude_source = 6;

  /*
   * Positional timestamp (actual timestamp of GPS solution) in integer epoch seconds
   */
  fixed32 timestamp = 7;

  /*
   * Pos. timestamp milliseconds adjustment (rarely available or required)
   * Wire encoding: sint32 (W1 fix, was int32)
   */
  sint32 timestamp_millis_adjust = 8;

  /*
   * HAE altitude in meters - can be used instead of MSL altitude
   */
  optional sint32 altitude_hae = 9;

  /*
   * Geoidal separation in meters
   */
  optional sint32 altitude_geoidal_separation = 10;

  /*
   * Horizontal, Vertical and Position Dilution of Precision, in 1/100 units
   * - PDOP is sufficient for most cases
   * - for higher precision scenarios, HDOP and VDOP can be used instead,
   *   in which case PDOP becomes redundant (PDOP=sqrt(HDOP^2 + VDOP^2))
   */
  uint32 PDOP = 11;

  /*
   * Horizontal Dilution of Precision, in 1/100 units
   */
  uint32 HDOP = 12;

  /*
   * Vertical Dilution of Precision, in 1/100 units
   */
  uint32 VDOP = 13;

  /*
   * GPS accuracy (a hardware specific constant) in mm
   *   multiplied with DOP to calculate positional accuracy
   * Default: "'bout three meters-ish" :)
   */
  uint32 gps_accuracy = 14;

  /*
   * Ground speed in m/s and True North TRACK in 1/100 degrees
   * Clarification of terms:
   * - "track" is the direction of motion (measured in horizontal plane)
   * - "heading" is where the fuselage points (measured in horizontal plane)
   * - "yaw" indicates a relative rotation about the vertical axis
   */
  optional uint32 ground_speed = 15;

  // Fields 16+ use 2-byte protobuf tags; less-critical fields go here

  /*
   * True North TRACK in 1/100 degrees
   */
  optional uint32 ground_track = 16;

  /*
   * GPS fix quality (from NMEA GxGGA statement or similar)
   */
  uint32 fix_quality = 17;

  /*
   * GPS fix type 2D/3D (from NMEA GxGSA statement)
   */
  uint32 fix_type = 18;

  /*
   * GPS "Satellites in View" number
   */
  uint32 sats_in_view = 19;

  /*
   * Sensor ID - in case multiple positioning sensors are being used
   */
  uint32 sensor_id = 20;

  /*
   * Estimated/expected time (in seconds) until next update:
   * - if we update at fixed intervals of X seconds, use X
   * - if we update at dynamic intervals (based on relative movement etc),
   *   but "AT LEAST every Y seconds", use Y
   */
  uint32 next_update = 21;

  /*
   * A sequence number, incremented with each Position message to help
   *   detect lost updates if needed
   */
  uint32 seq_number = 22;

  /*
   * Indicates the bits of precision set by the sending node
   */
  uint32 precision_bits = 23;
}

/*
 * Broadcast when a newly powered mesh node wants to find a node num it can use.
 * Sent from the phone over bluetooth to set the user id for the owner of this node.
 * Also sent from nodes to each other when a new node signs on (so all clients can have this info).
 */
message User {
  /*
   * A globally unique ID string for this user.
   * In the case of Signal that would mean +16504442323, for the default macaddr derived id it would be !<8 hexidecimal bytes>.
   * Note: app developers are encouraged to also use the following standard
   * node IDs "^all" (for broadcast), "^local" (for the locally connected node)
   */
  string id = 1;

  /*
   * A full name for this user, i.e. "Kevin Hester"
   */
  string long_name = 2;

  /*
   * A VERY short name, ideally two characters.
   * Suitable for a tiny OLED screen
   */
  string short_name = 3;

  /*
   * Hardware model, packed as (vendor_id << 8 | device_id).
   * Replaces the HardwareModel enum used in 2.x.
   */
  uint32 hw_model = 4;

  /*
   * In some regions Ham radio operators have different bandwidth limitations than others.
   * If this user is a licensed operator, set this flag.
   * Also, "long_name" should be their licence number.
   */
  bool is_licensed = 5;

  /*
   * Indicates that the user's role in the mesh.
   * Uses top-level Role enum from common.proto (was Config.DeviceConfig.Role in 2.x).
   */
  Role role = 6;

  /*
   * The public key of the user's device.
   * This is sent out to other nodes on the mesh to allow them to compute a shared secret key.
   */
  bytes public_key = 7;

  /*
   * Whether or not the node can be messaged
   */
  optional bool is_unmessagable = 8;
}

/*
 * A message used in a traceroute
 */
message RouteDiscovery {
  /*
   * The list of nodenums this packet has visited so far to the destination.
   */
  repeated fixed32 route = 1;

  /*
   * The list of SNRs (in dB, scaled by 4) in the route towards the destination.
   * Wire encoding: sint32 (W1 fix, was int32)
   */
  repeated sint32 snr_towards = 2;

  /*
   * The list of nodenums the packet has visited on the way back from the destination.
   */
  repeated fixed32 route_back = 3;

  /*
   * The list of SNRs (in dB, scaled by 4) in the route back from the destination.
   * Wire encoding: sint32 (W1 fix, was int32)
   */
  repeated sint32 snr_back = 4;
}

/*
 * A Routing control Data packet handled by the routing module
 */
message Routing {
  /*
   * A failure in delivering a message (usually used for routing control messages, but might be provided in addition to ack.fail_id to provide
   * details on the type of failure).
   */
  enum Error {
    /*
     * This message is not a failure
     */
    NONE = 0;

    /*
     * Our node doesn't have a route to the requested destination anymore.
     */
    NO_ROUTE = 1;

    /*
     * We received a nak while trying to forward on your behalf
     */
    GOT_NAK = 2;

    /*
     * Timeout waiting for response
     */
    TIMEOUT = 3;

    /*
     * No suitable interface could be found for delivering this packet
     */
    NO_INTERFACE = 4;

    /*
     * We reached the max retransmission count (typically for naive flood routing)
     */
    MAX_RETRANSMIT = 5;

    /*
     * No suitable channel was found for sending this packet (i.e. was requested channel index disabled?)
     */
    NO_CHANNEL = 6;

    /*
     * The packet was too big for sending (exceeds interface MTU after encoding)
     */
    TOO_LARGE = 7;

    /*
     * The request had want_response set, the request reached the destination node, but no service on that node wants to send a response
     * (possibly due to bad channel permissions)
     */
    NO_RESPONSE = 8;

    /*
     * Cannot send currently because duty cycle regulations will be violated.
     */
    DUTY_CYCLE_LIMIT = 9;

    /*
     * The application layer service on the remote node received your request, but considered your request somehow invalid
     */
    BAD_REQUEST = 32;

    /*
     * The application layer service on the remote node received your request, but considered your request not authorized
     * (i.e you did not send the request on the required bound channel)
     */
    NOT_AUTHORIZED = 33;

    /*
     * The client specified a PKI transport, but the node was unable to send the packet using PKI (and did not send the message at all)
     */
    PKI_FAILED = 34;

    /*
     * The receiving node does not have a Public Key to decode with
     */
    PKI_UNKNOWN_PUBKEY = 35;

    /*
     * Admin packet otherwise checks out, but uses a bogus or expired session key
     */
    ADMIN_BAD_SESSION_KEY = 36;

    /*
     * Admin packet sent using PKC, but not from a public key on the admin key list
     */
    ADMIN_PUBLIC_KEY_UNAUTHORIZED = 37;

    /*
     * Airtime fairness rate limit exceeded for a packet.
     * This is typically enforced per portnum and is used to prevent a single node from monopolizing airtime.
     */
    RATE_LIMIT_EXCEEDED = 38;

    /*
     * PKI encryption failed, due to no public key for the remote node.
     * This is different from PKI_UNKNOWN_PUBKEY which indicates a failure upon receiving a packet.
     */
    PKI_SEND_FAIL_PUBLIC_KEY = 39;
  }

  oneof variant {
    /*
     * A route request going from the requester
     */
    RouteDiscovery route_request = 1;

    /*
     * A route reply
     */
    RouteDiscovery route_reply = 2;

    /*
     * A failure in delivering a message (usually used for routing control messages, but might be provided
     * in addition to ack.fail_id to provide details on the type of failure).
     */
    Error error_reason = 3;
  }
}

/*
 * (Formerly called SubPacket)
 * The payload portion of a packet, this is the actual bytes that are sent
 * inside a radio packet (because from/to are broken out by the comms library)
 */
message Data {
  /*
   * Formerly named typ and of type Type
   */
  PortNum portnum = 1;

  /*
   * The payload data
   */
  bytes payload = 2;

  /*
   * Not normally used, but for testing a sender can request that recipient
   * responds in kind (i.e. if it received a position, it should unicast back its position).
   * Note: that if you set this on a broadcast you will receive many replies.
   */
  bool want_response = 3;

  /*
   * The address of the destination node.
   * This field is filled in by the mesh radio device software, application
   * layer software should never need it.
   * RouteDiscovery messages _must_ populate this.
   * Other message types might need to if they are doing multihop routing.
   */
  fixed32 dest = 4;

  /*
   * The address of the original sender for this message.
   * This field should _only_ be populated for reliable multihop packets (to keep
   * packets small).
   */
  fixed32 source = 5;

  /*
   * Only used in routing or response messages.
   * Indicates the original message ID that this message is reporting failure on. (formerly called original_id)
   */
  fixed32 request_id = 6;

  /*
   * If set, this message is intended to be a reply to a previously sent message with the defined id.
   */
  fixed32 reply_id = 7;

  /*
   * Defaults to zero. If nonzero, then what is in the payload should be treated as an emoji like giving
   * a message a heart or poop emoji.
   * Wire encoding: uint32 (W4 fix, was fixed32)
   */
  uint32 emoji = 8;

  /*
   * Bitfield for extra flags. First use is to indicate that user approves the packet being uploaded to MQTT.
   */
  optional uint32 bitfield = 9;
}

/*
 * The actual over-the-mesh message doing KeyVerification
 */
message KeyVerification {
  /*
   * Random value selected by the requesting node
   */
  uint64 nonce = 1;

  /*
   * The final authoritative hash, only to be sent by NodeA at the end of the handshake
   */
  bytes hash1 = 2;

  /*
   * The intermediary hash (actually derived from hash1),
   * sent from NodeB to NodeA in response to the initial message.
   */
  bytes hash2 = 3;
}

/*
 * The actual over-the-mesh message doing store and forward++
 */
message StoreForwardPlusPlus {
  /*
   * Enum of message types
   */
  enum SFPP_message_type {
    /*
     * Send an announcement of the canonical tip of a chain
     */
    CANON_ANNOUNCE = 0;

    /*
     * Query whether a specific link is on the chain
     */
    CHAIN_QUERY = 1;

    /*
     * Request the next link in the chain
     */
    LINK_REQUEST = 3;

    /*
     * Provide a link to add to the chain
     */
    LINK_PROVIDE = 4;

    /*
     * If we must fragment, send the first half
     */
    LINK_PROVIDE_FIRSTHALF = 5;

    /*
     * If we must fragment, send the second half
     */
    LINK_PROVIDE_SECONDHALF = 6;
  }

  /*
   * Which message type is this
   */
  SFPP_message_type sfpp_message_type = 1;

  /*
   * The hash of the specific message
   */
  bytes message_hash = 2;

  /*
   * The hash of a link on a chain
   */
  bytes commit_hash = 3;

  /*
   * The root hash of a chain
   */
  bytes root_hash = 4;

  /*
   * The encrypted bytes from a message
   */
  bytes message = 5;

  /*
   * Message ID of the contained message
   */
  uint32 encapsulated_id = 6;

  /*
   * Destination of the contained message
   */
  uint32 encapsulated_to = 7;

  /*
   * Sender of the contained message
   */
  uint32 encapsulated_from = 8;

  /*
   * The receive time of the message in question
   */
  uint32 encapsulated_rxtime = 9;

  /*
   * Used in a LINK_REQUEST to specify the message X spots back from head
   */
  uint32 chain_count = 10;
}

/*
 * Waypoint message, used to share arbitrary locations across the mesh
 */
message Waypoint {
  /*
   * Id of the waypoint
   */
  uint32 id = 1;

  /*
   * latitude_i
   */
  optional sfixed32 latitude_i = 2;

  /*
   * longitude_i
   */
  optional sfixed32 longitude_i = 3;

  /*
   * Time the waypoint is to expire (epoch)
   */
  uint32 expire = 4;

  /*
   * If greater than zero, treat the value as a nodenum only allowing them to update the waypoint.
   * If zero, the waypoint is open to be edited by any member of the mesh.
   */
  uint32 locked_to = 5;

  /*
   * Name of the waypoint - max 30 chars
   */
  string name = 6;

  /*
   * Description of the waypoint - max 100 chars
   */
  string description = 7;

  /*
   * Designator icon for the waypoint in the form of a unicode emoji
   * Wire encoding: uint32 (W4 fix, was fixed32)
   */
  uint32 icon = 8;
}

/*
 * Message for node status
 */
message StatusMessage {
  /*
   * The status text
   */
  string status = 1;
}

/*
 * This message will be proxied over the PhoneAPI for the client to deliver to the MQTT server
 */
message MqttClientProxyMessage {
  /*
   * The MQTT topic this message will be sent /received on
   */
  string topic = 1;

  /*
   * The actual service envelope payload or text for mqtt pub / sub
   */
  oneof payload_variant {
    /*
     * Bytes
     */
    bytes data = 2;

    /*
     * Text
     */
    string text = 3;
  }

  /*
   * Whether the message should be retained (or not)
   */
  bool retained = 4;
}

/*
 * Compressed payload wrapper
 */
message Compressed {
  /*
   * PortNum to determine the how to handle the compressed payload.
   */
  PortNum portnum = 1;

  /*
   * Compressed data.
   */
  bytes data = 2;
}

/*
 * Full info on edges for a single node
 */
message NeighborInfo {
  /*
   * The node ID of the node sending info on its neighbors
   */
  uint32 node_id = 1;

  /*
   * Field to pass neighbor info for the next sending cycle
   */
  uint32 last_sent_by_id = 2;

  /*
   * Broadcast interval of the represented node (in seconds)
   */
  uint32 node_broadcast_interval_secs = 3;

  /*
   * The list of out edges from this node
   */
  repeated Neighbor neighbors = 4;
}

/*
 * A single edge in the mesh
 */
message Neighbor {
  /*
   * Node ID of neighbor
   */
  uint32 node_id = 1;

  /*
   * SNR of last heard message (in dB, scaled by 4)
   * Wire encoding: sint32 (W3 fix, was float)
   */
  sint32 snr = 2;

  /*
   * Reception time (in secs since 1970) of last message that was last sent by this ID.
   * Note: this is for local storage only and will not be sent out over the mesh.
   */
  fixed32 last_rx_time = 3;

  /*
   * Broadcast interval of this neighbor (in seconds).
   * Note: this is for local storage only and will not be sent out over the mesh.
   */
  uint32 node_broadcast_interval_secs = 4;
}
