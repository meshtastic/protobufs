syntax = "proto3";

package meshtastic;

/* trunk-ignore(buf-lint/COMPILE) */
import "meshtastic/api.proto";
import "meshtastic/channel.proto";
import "meshtastic/common.proto";
import "meshtastic/config.proto";
import "meshtastic/connection_status.proto";
import "meshtastic/device_ui.proto";
import "meshtastic/module_config.proto";
import "meshtastic/packet.proto";
import "meshtastic/wire.proto";

option csharp_namespace = "Meshtastic.Protobufs";
option go_package = "github.com/meshtastic/go/generated";
option java_outer_classname = "AdminProtos";
option java_package = "org.meshtastic.proto";
option swift_prefix = "";

/*
 * This message is handled by the Admin module and is responsible for all settings/channel read/write operations.
 * This message is used to do settings operations to both remote AND local nodes.
 * (Prior to 1.2 these operations were done via special ToRadio operations)
 */
message AdminMessage {
  /*
   * The node generates this key and sends it with any get_x_response packets.
   * The client MUST include the same key with any set_x commands. Key expires after 300 seconds.
   * Prevents replay attacks for admin messages.
   */
  bytes session_passkey = 1;

  /*
   * Identifies which device configuration block to get or set
   */
  enum ConfigType {
    /*
     * Device configuration (role, serial behavior, etc.)
     */
    DEVICE_CONFIG = 0;

    /*
     * Position configuration (GPS settings, broadcast interval, etc.)
     */
    POSITION_CONFIG = 1;

    /*
     * Power configuration (sleep settings, ADC multiplier, etc.)
     */
    POWER_CONFIG = 2;

    /*
     * Network configuration (WiFi SSID/password, NTP, etc.)
     */
    NETWORK_CONFIG = 3;

    /*
     * Display configuration (screen orientation, units, OLED settings, etc.)
     */
    DISPLAY_CONFIG = 4;

    /*
     * LoRa radio configuration (region, modem preset, hop limit, TX power, etc.)
     */
    LORA_CONFIG = 5;

    /*
     * Bluetooth configuration (enabled, pairing mode, fixed PIN, etc.)
     */
    BLUETOOTH_CONFIG = 6;

    /*
     * Security configuration (public key, private key, admin key, etc.)
     */
    SECURITY_CONFIG = 7;

    /*
     * Session key config
     */
    SESSIONKEY_CONFIG = 8;

    /*
     * device-ui config
     */
    DEVICEUI_CONFIG = 9;
  }

  /*
   * Identifies which module configuration block to get or set
   */
  enum ModuleConfigType {
    /*
     * MQTT module configuration
     */
    MQTT_CONFIG = 0;

    /*
     * Serial module configuration
     */
    SERIAL_CONFIG = 1;

    /*
     * External notification module configuration
     */
    EXTNOTIF_CONFIG = 2;

    /*
     * Store and Forward module configuration
     */
    STOREFORWARD_CONFIG = 3;

    /*
     * Range test module configuration
     */
    RANGETEST_CONFIG = 4;

    /*
     * Telemetry module configuration
     */
    TELEMETRY_CONFIG = 5;

    /*
     * Canned message module configuration
     */
    CANNEDMSG_CONFIG = 6;

    /*
     * Audio module configuration
     */
    AUDIO_CONFIG = 7;

    /*
     * Remote hardware module configuration
     */
    REMOTEHARDWARE_CONFIG = 8;

    /*
     * Neighbor info module configuration
     */
    NEIGHBORINFO_CONFIG = 9;

    /*
     * Ambient lighting module configuration
     */
    AMBIENTLIGHTING_CONFIG = 10;

    /*
     * Detection sensor module configuration
     */
    DETECTIONSENSOR_CONFIG = 11;

    /*
     * Paxcounter module configuration
     */
    PAXCOUNTER_CONFIG = 12;

    /*
     * Status message module configuration
     */
    STATUSMESSAGE_CONFIG = 13;

    /*
     * Traffic management module config
     */
    TRAFFICMANAGEMENT_CONFIG = 14;

    /*
     * TAK module config
     */
    TAK_CONFIG = 15;
  }

  enum BackupLocation {
    /*
     * Backup to the internal flash
     */
    FLASH = 0;

    /*
     * Backup to the SD card
     */
    SD = 1;
  }

  /*
   * Input event message to be sent to the node.
   */
  message InputEvent {
    /*
     * The input event code
     */
    uint32 event_code = 1;
    /*
     * Keyboard character code
     */
    uint32 kb_char = 2;
    /*
     * The touch X coordinate
     */
    uint32 touch_x = 3;
    /*
     * The touch Y coordinate
     */
    uint32 touch_y = 4;
  }

  /*
   * User is requesting an over the air update.
   * Node will reboot into the OTA loader
   */
  message OTAEvent {
    /*
     * Tell the node to reboot into OTA mode for firmware update via BLE or WiFi (ESP32 only for now)
     */
    OTAMode reboot_ota_mode = 1;

    /*
     * A 32 byte hash of the OTA firmware.
     * Used to verify the integrity of the firmware before applying an update.
     */
    bytes ota_hash = 2;
  }

  /*
   * The admin operation to perform
   */
  oneof payload_variant {
    /*
     * Send the specified channel in the response to this message
     * NOTE: This field is sent with the channel index + 1 (to ensure we never try to send 'zero' - which protobufs treats as not present)
     */
    uint32 get_channel_request = 2;

    /*
     * Return the current channel data for the requested index
     */
    Channel get_channel_response = 3;

    /*
     * Send the current owner data in the response to this message.
     */
    bool get_owner_request = 4;

    /*
     * Return the current owner (User) data for this node
     */
    User get_owner_response = 5;

    /*
     * Ask for the following config data to be sent
     */
    ConfigType get_config_request = 6;

    /*
     * Send the current Config in the response to this message.
     */
    ConfigPayload get_config_response = 7;

    /*
     * Ask for the following config data to be sent
     */
    ModuleConfigType get_module_config_request = 8;

    /*
     * Send the current Config in the response to this message.
     */
    ModuleConfigPayload get_module_config_response = 9;

    /*
     * Get the Canned Message Module messages in the response to this message.
     */
    bool get_canned_message_module_messages_request = 10;

    /*
     * Get the Canned Message Module messages in the response to this message.
     */
    string get_canned_message_module_messages_response = 11;

    /*
     * Request the node to send device metadata (firmware, protobuf version, etc)
     */
    bool get_device_metadata_request = 12;

    /*
     * Device metadata response
     */
    DeviceMetadata get_device_metadata_response = 13;

    /*
     * Get the Ringtone in the response to this message.
     */
    bool get_ringtone_request = 14;

    /*
     * Get the Ringtone in the response to this message.
     */
    string get_ringtone_response = 15;

    /*
     * Request the node to send it's connection status
     */
    bool get_device_connection_status_request = 16;

    /*
     * Device connection status response
     */
    DeviceConnectionStatus get_device_connection_status_response = 17;

    /*
     * Setup a node for licensed amateur (ham) radio operation
     */
    HamParameters set_ham_mode = 18;

    /*
     * Get the mesh's nodes with their available gpio pins for RemoteHardware module use
     */
    bool get_node_remote_hardware_pins_request = 19;

    /*
     * Respond with the mesh's nodes with their available gpio pins for RemoteHardware module use
     */
    NodeRemoteHardwarePinsResponse get_node_remote_hardware_pins_response = 20;

    /*
     * Enter (UF2) DFU mode
     * Only implemented on NRF52 currently
     */
    bool enter_dfu_mode_request = 21;

    /*
     * Delete the file by the specified path from the device
     */
    string delete_file_request = 22;

    /*
     * Set zero and offset for scale chips
     */
    uint32 set_scale = 23;

    /*
     * Backup the node's preferences
     */
    BackupLocation backup_preferences = 24;

    /*
     * Restore the node's preferences
     */
    BackupLocation restore_preferences = 25;

    /*
     * Remove backups of the node's preferences
     */
    BackupLocation remove_backup_preferences = 26;

    /*
     * Send an input event to the node.
     * This is used to trigger physical input events like button presses, touch events, etc.
     */
    InputEvent send_input_event = 27;

    /*
     * Set the owner for this node
     */
    User set_owner = 28;

    /*
     * Set channels (using the new API).
     * A special channel is the "primary channel".
     * The other records are secondary channels.
     * Note: only one channel can be marked as primary.
     * If the client sets a particular channel to be primary, the previous channel will be set to SECONDARY automatically.
     */
    Channel set_channel = 29;

    /*
     * Set the current Config
     */
    ConfigPayload set_config = 30;

    /*
     * Set the current Config
     */
    ModuleConfigPayload set_module_config = 31;

    /*
     * Set the Canned Message Module messages text.
     */
    string set_canned_message_module_messages = 32;

    /*
     * Set the ringtone for ExternalNotification.
     */
    string set_ringtone_message = 33;

    /*
     * Remove the node by the specified node-num from the NodeDB on the device
     */
    uint32 remove_by_nodenum = 34;

    /*
     * Set specified node-num to be favorited on the NodeDB on the device
     */
    uint32 set_favorite_node = 35;

    /*
     * Set specified node-num to be un-favorited on the NodeDB on the device
     */
    uint32 remove_favorite_node = 36;

    /*
     * Set fixed position data on the node and then set the position.fixed_position = true
     */
    Position set_fixed_position = 37;

    /*
     * Clear fixed position coordinates and then set position.fixed_position = false
     */
    bool remove_fixed_position = 38;

    /*
     * Set time only on the node
     * Convenience method to set the time on the node (as Net quality) without any other position data
     */
    fixed32 set_time_only = 39;

    /*
     * Tell the node to send the stored ui data.
     */
    bool get_ui_config_request = 40;

    /*
     * Reply stored device ui data.
     */
    DeviceUIConfig get_ui_config_response = 41;

    /*
     * Tell the node to store UI data persistently.
     */
    DeviceUIConfig store_ui_config = 42;

    /*
     * Set specified node-num to be ignored on the NodeDB on the device
     */
    uint32 set_ignored_node = 43;

    /*
     * Set specified node-num to be un-ignored on the NodeDB on the device
     */
    uint32 remove_ignored_node = 44;

    /*
     * Set specified node-num to be muted
     */
    uint32 toggle_muted_node = 45;

    /*
     * Begins an edit transaction for config, module config, owner, and channel settings changes
     * This will delay the standard *implicit* save to the file system and subsequent reboot behavior until committed (commit_edit_settings)
     */
    bool begin_edit_settings = 46;

    /*
     * Commits an open transaction for any edits made to config, module config, owner, and channel settings
     */
    bool commit_edit_settings = 47;

    /*
     * Add a contact (User) to the nodedb
     */
    SharedContact add_contact = 48;

    /*
     * Initiate or respond to a key verification request
     */
    KeyVerificationAdmin key_verification = 49;

    /*
     * Tell the node to factory reset config everything; all device state and configuration will be returned to factory defaults and BLE bonds will be cleared.
     */
    sint32 factory_reset_device = 50;

    /*
     * This message is only supported for the simulator Portduino build.
     * If received the simulator will exit successfully.
     */
    bool exit_simulator = 51;

    /*
     * Tell the node to reboot in this many seconds (or <0 to cancel reboot)
     */
    sint32 reboot_seconds = 52;

    /*
     * Tell the node to shutdown in this many seconds (or <0 to cancel shutdown)
     */
    sint32 shutdown_seconds = 53;

    /*
     * Tell the node to factory reset config; all device state and configuration will be returned to factory defaults; BLE bonds will be preserved.
     */
    sint32 factory_reset_config = 54;

    /*
     * Tell the node to reset the nodedb.
     * When true, favorites are preserved through reset.
     */
    bool nodedb_reset = 55;

    /*
     * Tell the node to reset into the OTA Loader
     */
    OTAEvent ota_request = 56;

    /*
     * Parameters and sensor configuration
     */
    SensorConfig sensor_config = 57;
  }
}

/*
 * Firmware update mode for OTA updates
 */
enum OTAMode {
  /*
   * Do not reboot into OTA mode
   */
  NO_REBOOT_OTA = 0;

  /*
   * Reboot into OTA mode for BLE firmware update
   */
  OTA_BLE = 1;

  /*
   * Reboot into OTA mode for WiFi firmware update
   */
  OTA_WIFI = 2;
}

/*
 * Parameters for setting up Meshtastic for ameteur radio usage
 */
message HamParameters {
  /*
   * Amateur radio call sign, eg. KD2ABC
   */
  string call_sign = 1;

  /*
   * Transmit power in dBm at the LoRA transceiver, not including any amplification
   */
  int32 tx_power = 2;

  /*
   * Frequency in Hz
   */
  uint32 frequency = 3;

  /*
   * Optional short name of user
   */
  string short_name = 4;
}

/*
 * Response envelope for node_remote_hardware_pins
 */
message NodeRemoteHardwarePinsResponse {
  /*
   * Nodes and their respective remote hardware GPIO pins
   */
  repeated NodeRemoteHardwarePin node_remote_hardware_pins = 1;
}

message SharedContact {
  /*
   * The node number of the contact
   */
  uint32 node_num = 1;

  /*
   * The User of the contact
   */
  User user = 2;

  /*
   * Add this contact to the blocked / ignored list
   */
  bool should_ignore = 3;

  /*
   * Set the IS_KEY_MANUALLY_VERIFIED bit
   */
  bool manually_verified = 4;
}

/*
 * This message is used by a client to initiate or complete a key verification
 */
message KeyVerificationAdmin {
  /*
   * Three stages of this request.
   */
  enum MessageType {
    /*
     * This is the first stage, where a client initiates
     */
    INITIATE_VERIFICATION = 0;

    /*
     * After the nonce has been returned over the mesh, the client prompts for the security number
     * And uses this message to provide it to the node.
     */
    PROVIDE_SECURITY_NUMBER = 1;

    /*
     * Once the user has compared the verification message, this message notifies the node.
     */
    DO_VERIFY = 2;

    /*
     * This is the cancel path, can be taken at any point
     */
    DO_NOT_VERIFY = 3;
  }

  MessageType message_type = 1;

  /*
   * The nodenum we're requesting
   */
  uint32 remote_nodenum = 2;

  /*
   * The nonce is used to track the connection
   */
  uint64 nonce = 3;

  /*
   * The 4 digit code generated by the remote node, and communicated outside the mesh
   */
  optional uint32 security_number = 4;
}

message SensorConfig {
  /*
   * SCD4X CO2 Sensor configuration
   */
  SCD4X_config scd4x_config = 1;

  /*
   * SEN5X PM Sensor configuration
   */
  SEN5X_config sen5x_config = 2;

  /*
   * SCD30 CO2 Sensor configuration
   */
  SCD30_config scd30_config = 3;
}

message SCD4X_config {
  /*
   * Set Automatic self-calibration enabled
   */
  optional bool set_asc = 1;

  /*
   * Recalibration target CO2 concentration in ppm (FRC or ASC)
   */
  optional uint32 set_target_co2_conc = 2;

  /*
   * Reference temperature in centi-degrees Celsius
   */
  optional sint32 set_temperature = 3;

  /*
   * Altitude of sensor in meters above sea level. 0 - 3000m (overrides ambient pressure)
   */
  optional uint32 set_altitude = 4;

  /*
   * Sensor ambient pressure in Pa. 70000 - 120000 Pa (overrides altitude)
   */
  optional uint32 set_ambient_pressure = 5;

  /*
   * Perform a factory reset of the sensor
   */
  optional bool factory_reset = 6;

  /*
   * Power mode for sensor (true for low power, false for normal)
   */
  optional bool set_power_mode = 7;
}

message SEN5X_config {
  /*
   * Reference temperature in centi-degrees Celsius
   */
  optional sint32 set_temperature = 1;

  /*
   * One-shot mode (true for low power - one-shot mode, false for normal - continuous mode)
   */
  optional bool set_one_shot_mode = 2;
}

message SCD30_config {
  /*
   * Set Automatic self-calibration enabled
   */
  optional bool set_asc = 1;

  /*
   * Recalibration target CO2 concentration in ppm (FRC or ASC)
   */
  optional uint32 set_target_co2_conc = 2;

  /*
   * Reference temperature in centi-degrees Celsius
   */
  optional sint32 set_temperature = 3;

  /*
   * Altitude of sensor in meters above sea level. 0 - 3000m (overrides ambient pressure)
   */
  optional uint32 set_altitude = 4;

  /*
   * Power mode for sensor (true for low power, false for normal)
   */
  optional uint32 set_measurement_interval = 5;

  /*
   * Perform a factory reset of the sensor
   */
  optional bool soft_reset = 6;
}
