syntax = "proto3";

package meshtastic;

option csharp_namespace = "Meshtastic.Protobufs";
option go_package = "github.com/meshtastic/go/generated";
option java_outer_classname = "SerialHal";
option java_package = "org.meshtastic.proto";
option swift_prefix = "";

message SerialHalCommand {
  enum Type {
    UNSET = 0;
    PIN_MODE = 1;
    DIGITAL_WRITE = 2;
    DIGITAL_READ = 3;
    ATTACH_INTERRUPT = 4;
    DETACH_INTERRUPT = 5;
    SPI_TRANSFER = 6;
    NOOP = 7;
  }

  uint32 transaction_id = 1;
  Type type = 2;
  uint32 pin = 3;
  uint32 value = 4;
  uint32 mode = 5;
  bytes data = 6;
}

message SerialHalResponse {
  enum Result {
    OK = 0;
    ERROR = 1;
    BAD_REQUEST = 2;
    UNSUPPORTED = 3;
  }

  uint32 transaction_id = 1;
  Result result = 2;
  uint32 value = 3;
  bytes data = 4;
  string error = 5;
}
