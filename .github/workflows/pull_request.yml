name: pull-request

permissions:
  contents: read
  pull-requests: write

on: pull_request
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Buf PR Checks
        uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.72.0 # renovate: datasource=github-releases depName=bufbuild/buf
          github_token: ${{ github.token }}
          token: ${{ secrets.BUF_TOKEN }}
          format: true
          lint: true
          breaking: true
